<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Виртуальный тур 360°</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; }
        #canvas-container { width: 100%; height: 100%; cursor: grab; }
        .hint { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); color: white; background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 20px; }
    </style>
    <!-- Исправленные CDN-ссылки -->
    <script src="https://cloudflare.com"></script>
    <script src="https://jsdelivr.net"></script>
</head>
<body>
    <div class="hint">Зажмите мышь и вращайте для обзора 360°</div>
    <div id="canvas-container"></div>
    <script>
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 0.01); 
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.rotateSpeed = -0.4; 
        const loader = new THREE.TextureLoader();
        // Используются файлы: wall1.jpg, wall2.jpg, wall3.jpg, wall4.jpg, floor.jpg, ceiling.jpg
        const materialArray = ['wall2','wall4','ceiling','floor','wall1','wall3'].map(name => 
            new THREE.MeshBasicMaterial({ map: loader.load(name + '.jpg'), side: THREE.BackSide })
        );
        const skybox = new THREE.Mesh(new THREE.BoxGeometry(10, 10, 10), materialArray);
        scene.add(skybox);
        function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }
        animate();
    </script>
</body>
</html>
