<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Виртуальный тур 360° (Идеальный CSS 3D)</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: sans-serif; }
        /* perspective задает правильный фокус камеры внутрь прямоугольника */
        #view-container { width: 100%; height: 100%; perspective: 800px; display: flex; align-items: center; justify-content: center; cursor: grab; }
        
        /* Главная коробка: длина 2900px, высота 1000px. Камера стоит строго в центре (translateZ(0)) */
        #cube { width: 2900px; height: 1000px; position: relative; transform-style: preserve-3d; transform: translateZ(0px) rotateX(0deg) rotateY(0deg); }
        .face { position: absolute; background-size: 100% 100%; background-position: center; backface-visibility: hidden; }
        
        /* ДЛИННЫЕ СТЕНЫ: Сдвигаем вперед/назад ровно на половину ширины торца (1933 / 2 = 966.5px) */
        .front  { width: 2900px; height: 1000px; transform: rotateY(  0deg) translateZ(-966.5px); background-image: url('wall1.jpeg'); }
        .back   { width: 2900px; height: 1000px; transform: rotateY(180deg) translateZ(-966.5px); background-image: url('wall3.jpeg'); }
        
        /* ТОРЦЕВЫЕ СТЕНЫ: Меняем их ширину на 1933px и сдвигаем влево/вправо на половину длины (2900 / 2 = 1450px) */
        .right  { width: 1933px; height: 1000px; transform: rotateY( -90deg) translateZ(-1450px); background-image: url('wall2.jpeg'); }
        .left   { width: 1933px; height: 1000px; transform: rotateY(  90deg) translateZ(-1450px); background-image: url('wall4.jpeg'); }
        
        /* ПОТОЛОК И ПОЛ: Должны идеально закрывать прямоугольник 2900x1933. Сдвигаем по высоте ровно на половину стены (1000 / 2 = 500px) */
        .top    { width: 2900px; height: 1933px; transform: rotateX(  90deg) translateZ(-500px); background-image: url('ceiling.jpeg'); }
        .bottom { width: 2900px; height: 1933px; transform: rotateX( -90deg) translateZ(-500px); background-image: url('floor.jpeg'); }

        .hint { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); color: white; background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 20px; z-index: 10; pointer-events: none; }
    </style>
</head>
<body>
    <div class="hint">Зажмите мышь и вращайте для обзора комнаты 360°</div>
    <div id="view-container">
        <div id="cube">
            <div class="face front"></div>
            <div class="face right"></div>
            <div class="face back"></div>
            <div class="face left"></div>
            <div class="face top"></div>
            <div class="face bottom"></div>
        </div>
    </div>

    <script>
        const container = document.getElementById('view-container');
        const cube = document.getElementById('cube');
        
        let isDragging = false;
        let startX, startY;
        let rotateX = 0, rotateY = 0;

        container.addEventListener('mousedown', (e) => {
            isDragging = true;
            container.style.cursor = 'grabbing';
            startX = e.clientX;
            startY = e.clientY;
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const deltaX = e.clientX - startX;
            const deltaY = e.clientY - startY;
            
            // Плавное вращение коробки вокруг вас
            rotateY += deltaX * 0.15;
            rotateX -= deltaY * 0.15;
            
            // Ограничиваем обзор вверх/вниз, чтобы комната не выворачивалась
            rotateX = Math.max(-70, Math.min(70, rotateX));
            
            // Камера жестко зафиксирована в центре (translateZ(0px))
            cube.style.transform = `translateZ(0px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
            
            startX = e.clientX;
            startY = e.clientY;
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
            container.style.cursor = 'grab';
        });

        // Тач-управление для смартфонов
        container.addEventListener('touchstart', (e) => {
            isDragging = true;
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
        });

        window.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            const deltaX = e.touches[0].clientX - startX;
            const deltaY = e.touches[0].clientY - startY;
            
            rotateY += deltaX * 0.15;
            rotateX -= deltaY * 0.15;
            rotateX = Math.max(-70, Math.min(70, rotateX));
            
            cube.style.transform = `translateZ(0px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
            
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
        });

        window.addEventListener('touchend', () => isDragging = false);
    </script>
</body>
</html>
