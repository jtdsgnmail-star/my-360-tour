<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Виртуальный тур 360° (3D)</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: sans-serif; }
        #view-container { width: 100%; height: 100%; perspective: 600px; display: flex; align-items: center; justify-content: center; cursor: grab; }
        #cube { width: 1000px; height: 1000px; position: relative; transform-style: preserve-3d; transform: translateZ(450px) rotateX(0deg) rotateY(0deg); }
        .face { position: absolute; width: 1000px; height: 1000px; background-size: cover; background-position: center; backface-visibility: hidden; }
        
        /* Исправленные пути к файлам: без двойного расширения jpeg */
                /* Полное соответствие именам файлов в вашем репозитории */
        .front  { transform: rotateY(  0deg) translateZ(-500px); background-image: url('wall1.jpeg'); }
        .right  { transform: rotateY( -90deg) translateZ(-500px); background-image: url('wall2.jpeg'); }
        .back   { transform: rotateY(180deg) translateZ(-500px); background-image: url('wall3.jpeg'); }
        .left   { transform: rotateY(  90deg) translateZ(-500px); background-image: url('wall4.jpeg'); }
        .top    { transform: rotateX( -90deg) translateZ(-500px); background-image: url('ceiling.jpeg'); }
        .bottom { transform: rotateX(  90deg) translateZ(-500px); background-image: url('floor.jpeg'); }
        
        .hint { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); color: white; background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 20px; z-index: 10; pointer-events: none; }
    </style>
</head>
<body>
    <div class="hint">Зажмите мышь и вращайте для обзора комнаты 360°</div>
    <div id="view-container">
        <div id="cube">
            <div class="face front"></div>
            <div class="face right"></div>
            <div class="face back"></div>
            <div class="face left"></div>
            <div class="face top"></div>
            <div class="face bottom"></div>
        </div>
    </div>

    <script>
        const container = document.getElementById('view-container');
        const cube = document.getElementById('cube');
        
        let isDragging = false;
        let startX, startY;
        let rotateX = 0, rotateY = 0;

        container.addEventListener('mousedown', (e) => {
            isDragging = true;
            container.style.cursor = 'grabbing';
            startX = e.clientX;
            startY = e.clientY;
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const deltaX = e.clientX - startX;
            const deltaY = e.clientY - startY;
            
            rotateY += deltaX * 0.2;
            rotateX -= deltaY * 0.2;
            rotateX = Math.max(-85, Math.min(85, rotateX));
            
            cube.style.transform = `translateZ(450px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
            
            startX = e.clientX;
            startY = e.clientY;
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
            container.style.cursor = 'grab';
        });

        container.addEventListener('touchstart', (e) => {
            isDragging = true;
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
        });

        window.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            const deltaX = e.touches[0].clientX - startX;
            const deltaY = e.touches[0].clientY - startY;
            rotateY += deltaX * 0.2;
            rotateX -= deltaY * 0.2;
            rotateX = Math.max(-85, Math.min(85, rotateX));
            cube.style.transform = `translateZ(450px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
        });

        window.addEventListener('touchend', () => isDragging = false);
    </script>
</body>
</html>
