<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Виртуальный тур 360°</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; }
        #canvas-container { width: 100%; height: 100%; cursor: grab; }
        .hint { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); color: white; background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 20px; z-index: 10; font-family: sans-serif; pointer-events: none; }
        #error-log { position: absolute; bottom: 20px; left: 20px; color: #ff4d4d; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 5px; font-family: monospace; max-width: 80%; display: none; z-index: 20; }
    </style>
</head>
<body>
    <div class="hint">Зажмите мышь и вращайте для обзора 360°</div>
    <div id="error-log"></div>
    <div id="canvas-container"></div>

    <!-- Автономный загрузчик резервных копий библиотек -->
    <script>
        window.THREE || document.write('<script src="https://jsdelivr.net"><\/script>');
    </script>
    <script>
        window.THREE && !window.THREE.OrbitControls && document.write('<script src="https://jsdelivr.net"><\/script>');
    </script>

    <script>
        // Функция запуска тура после того, как библиотеки точно загрузятся
        function initTour() {
            if (!window.THREE || !THREE.OrbitControls) {
                // Если основные CDN лежат, используем ультра-стабильное зеркало
                const s1 = document.createElement('script');
                s1.src = "https://cloudflare.com";
                s1.onload = () => {
                    const s2 = document.createElement('script');
                    s2.src = "https://jsdelivr.net";
                    s2.onload = startEngine;
                    document.head.appendChild(s2);
                };
                document.head.appendChild(s1);
            } else {
                startEngine();
            }
        }

        function startEngine() {
            const container = document.getElementById('canvas-container');
            const errorLog = document.getElementById('error-log');
            
            function showImgError(fileName) {
                errorLog.style.display = 'block';
                errorLog.innerHTML += `❌ Ошибка загрузки файла: <b>${fileName}</b><br>Проверьте, что он загружен на GitHub и его имя написано точь-в-точь так же.<br>`;
            }

            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 0.01); 

            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            container.appendChild(renderer.domElement);

            const controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.rotateSpeed = -0.4; 
            controls.enableZoom = true;
            controls.enableDamping = true; 

            const loader = new THREE.TextureLoader();
            const order = ['wall2', 'wall4', 'ceiling', 'floor', 'wall1', 'wall3'];
            
            const materialArray = order.map(name => {
                const fileName = name + '.jpeg'; 
                return new THREE.MeshBasicMaterial({ 
                    map: loader.load(
                        fileName, 
                        undefined, 
                        undefined, 
                        () => showImgError(fileName)
                    ), 
                    side: THREE.BackSide 
                });
            });

            const skybox = new THREE.Mesh(new THREE.BoxGeometry(10, 10, 10), materialArray);
            scene.add(skybox);

            function animate() { 
                requestAnimationFrame(animate);
                controls.update(); 
                renderer.render(scene, camera); 
            }
            animate();

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        // Запуск проверки при загрузке страницы
        setTimeout(initTour, 500);
    </script>
</body>
</html>
