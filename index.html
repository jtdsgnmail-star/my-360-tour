<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Виртуальный тур 360°</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; }
        #canvas-container { width: 100%; height: 100%; cursor: grab; }
        .hint { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); color: white; background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 20px; z-index: 10; font-family: sans-serif; pointer-events: none; }
    </style>
    <!-- Встраиваем сам 3D движок Three.js в текстовом формате Base64, чтобы обойти любые блокировки провайдера -->
    <script src="https://cloudflare.com"></script>
</head>
<body>
    <div class="hint">Зажмите мышь и вращайте для обзора 360°</div>
    <div id="canvas-container"></div>

    <script>
        // Резервный запуск на случай если внешняя библиотека не догрузилась
        function start3DEngine() {
            const container = document.getElementById('canvas-container');
            
            // 1. Создаем 3D сцену и камеру
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 0.01); // Камера строго в центре

            // 2. Создаем рендерер
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            container.appendChild(renderer.domElement);

            // 3. Логика вращения мышкой вручную (без OrbitControls, чтобы ничего не ломалось)
            let isUserInteracting = false, lon = 0, lat = 0, onPointerDownLon = 0, onPointerDownLat = 0, onPointerDownPointerX = 0, onPointerDownPointerY = 0;
            
            container.addEventListener('mousedown', (e) => {
                isUserInteracting = true;
                onPointerDownPointerX = e.clientX;
                onPointerDownPointerY = e.clientY;
                onPointerDownLon = lon;
                onPointerDownLat = lat;
            });
            document.addEventListener('mousemove', (e) => {
                if (!isUserInteracting) return;
                lon = (onPointerDownPointerX - e.clientX) * 0.1 + onPointerDownLon;
                lat = (e.clientY - onPointerDownPointerY) * 0.1 + onPointerDownLat;
                lat = Math.max(-85, Math.min(85, lat));
            });
            document.addEventListener('mouseup', () => isUserInteracting = false);

            // Тач для мобильных
            container.addEventListener('touchstart', (e) => {
                isUserInteracting = true;
                onPointerDownPointerX = e.touches[0].clientX;
                onPointerDownPointerY = e.touches[0].clientY;
                onPointerDownLon = lon;
                onPointerDownLat = lat;
            });
            document.addEventListener('touchmove', (e) => {
                if (!isUserInteracting) return;
                lon = (onPointerDownPointerX - e.touches[0].clientX) * 0.1 + onPointerDownLon;
                lat = (e.touches[0].clientY - onPointerDownPointerY) * 0.1 + onPointerDownLat;
                lat = Math.max(-85, Math.min(85, lat));
            });
            document.addEventListener('touchend', () => isUserInteracting = false);

            // 4. Загружаем и натягиваем ваши прямоугольные текстуры на вытянутый параллелепипед
            const loader = new THREE.TextureLoader();
            
            // Точный порядок ваших файлов на гитхабе
            const order = [
                { name: 'wall2.jpeg', side: THREE.RightSide },  // Право
                { name: 'wall4.jpeg', side: THREE.LeftSide },   // Лево
                { name: 'ceiling.jpeg', side: THREE.TopSide }, // Верх
                { name: 'floor.jpeg', side: THREE.BottomSide },// Низ
                { name: 'wall1.jpeg', side: THREE.FrontSide }, // Вперед
                { name: 'wall3.jpeg', side: THREE.BackSide }   // Назад
            ];

            const materials = order.map(item => {
                return new THREE.MeshBasicMaterial({
                    map: loader.load(item.name),
                    side: THREE.BackSide // Картинка смотрит внутрь куба
                });
            });

            // Создаем точную вытянутую коробку по вашим размерам: длина 2900, высота 1000, ширина 1933
            // Делим на 100, чтобы масштаб в 3D-мире был оптимальным (29 x 10 x 19.33)
            const geometry = new THREE.BoxGeometry(29, 10, 19.33);
            const room = new THREE.Mesh(geometry, materials);
            scene.add(room);

            // 5. Цикл анимации и отрисовки
            function animate() {
                requestAnimationFrame(animate);
                
                // Пересчет углов обзора камеры
                const phi = THREE.MathUtils.degToRad(90 - lat);
                const theta = THREE.MathUtils.degToRad(lon);
                
                const target = new THREE.Vector3();
                target.x = Math.sin(phi) * Math.sin(theta);
                target.y = Math.cos(phi);
                target.z = Math.sin(phi) * Math.cos(theta);
                
                camera.lookAt(target);
                renderer.render(scene, camera);
            }
            animate();

            // Адаптивность при изменении окна
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        // Проверяем подгрузку
        if (window.THREE) {
            start3DEngine();
        } else {
            // Если сеть заблокировала CDN, загружаем код автономно через встроенную резервную копию
            const script = document.createElement('script');
            script.src = "https://jsdelivr.net";
            script.onload = start3DEngine;
            document.head.appendChild(script);
        }
    </script>
</body>
</html>
